<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#071C33">
<title>Verify Certificate — Platinum Insurers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--navy:#0B2A4A;--navy2:#071C33;--ink:#050F1D;--steel-lite:#9FB2C6;--gold:#C9A24B;--gold-lite:#E4C877;
    --cream:#EDEAE2;--mute:#7E90A6;--green:#3FB27A;--amber:#E0A94B;--red:#F0888C;--line:rgba(159,178,198,.16)}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:Inter,-apple-system,system-ui,sans-serif;color:var(--cream);
    background:radial-gradient(120% 80% at 15% 0%,rgba(201,162,75,.10),transparent 42%),
      radial-gradient(100% 70% at 100% 100%,rgba(62,92,130,.22),transparent 55%),
      linear-gradient(180deg,var(--navy) 0%,var(--navy2) 55%,var(--ink) 100%);
    background-attachment:fixed;min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.55}
  .serif{font-family:Fraunces,Georgia,serif}
  .wrap{max-width:460px;margin:0 auto;padding:26px 24px 40px;min-height:100vh;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;gap:11px;justify-content:center;margin-bottom:8px}
  .topbar .b{font-family:Fraunces;font-weight:600;font-size:16px}
  .topbar .s{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--steel-lite)}
  .center{flex:1;display:flex;flex-direction:column;justify-content:center}
  .card{border:1px solid var(--line);border-radius:20px;overflow:hidden;
    background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.01))}
  .status{display:flex;flex-direction:column;align-items:center;text-align:center;padding:30px 22px 22px}
  .ring{width:82px;height:82px;border-radius:50%;display:grid;place-items:center;margin-bottom:16px}
  .ring.ok{background:rgba(63,178,122,.14);border:2px solid var(--green)}
  .ring.warn{background:rgba(224,169,75,.14);border:2px solid var(--amber)}
  .ring.bad{background:rgba(240,136,140,.12);border:2px solid var(--red)}
  .ring.load{border:3px solid var(--line);border-top-color:var(--gold);animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .st{font-family:Fraunces;font-weight:600;font-size:22px;margin:0}
  .st.ok{color:var(--green)} .st.warn{color:var(--amber)} .st.bad{color:var(--red)}
  .sub{color:var(--steel-lite);font-size:13px;margin:6px 0 0;max-width:300px}
  .rows{border-top:1px solid var(--line);padding:6px 22px 20px}
  .row{display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .row:last-child{border-bottom:none}
  .row .k{color:var(--mute)} .row .v{font-weight:600;text-align:right;color:var(--cream)}
  .stamp{display:flex;align-items:center;gap:7px;justify-content:center;padding:12px;font-size:11px;letter-spacing:.05em;color:var(--steel-lite);border-top:1px solid var(--line)}
  .foot{text-align:center;color:var(--mute);font-size:11px;margin-top:22px}
  .foot b{color:var(--steel-lite);font-weight:600}
  .retry{margin-top:16px;display:flex;justify-content:center}
  .retry button{padding:11px 22px;border:1px solid var(--line);border-radius:11px;background:none;color:var(--cream);font-family:Inter;font-weight:600;font-size:14px;cursor:pointer}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <svg width="34" height="34" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M60 6 L104 22 V58 C104 84 84 104 60 114 C36 104 16 84 16 58 V22 Z" fill="#0B2A4A" stroke="#C9A24B" stroke-width="4"/>
      <text x="60" y="78" text-anchor="middle" font-family="Fraunces,Georgia,serif" font-size="54" font-weight="700" fill="#E4C877">P</text>
    </svg>
    <div><div class="b">Platinum Insurers</div><div class="s">Certificate Verification</div></div>
  </div>

  <div class="center">
    <div class="card" id="card">
      <div class="status">
        <div class="ring load" id="ring"></div>
        <h1 class="st" id="st" style="color:var(--cream)">Verifying…</h1>
        <p class="sub" id="sub">Checking this certificate against the live register.</p>
      </div>
      <div class="rows" id="rows" style="display:none"></div>
      <div class="stamp" id="stamp" style="display:none"></div>
    </div>
    <div class="retry" id="retry" style="display:none"><button onclick="run()">Try again</button></div>
  </div>

  <div class="foot">Live register lookup · <b>Platinum Insurers Liberia Inc.</b><br>Sandbox demonstration — not a contract of insurance.</div>
</div>

<script>
const BASE="https://kfhadcpnqvnqrhzrkaeq.supabase.co/functions/v1/pg";
const $=id=>document.getElementById(id);
function qp(k){return new URLSearchParams(location.search).get(k)}
function fmt(d){try{return new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})}catch(e){return d||"—"}}

function setState(kind,title,sub){
  const ring=$("ring"),st=$("st");
  ring.className="ring "+kind;
  st.className="st "+(kind==="ok"?"ok":kind==="warn"?"warn":kind==="bad"?"bad":"");
  if(kind!=="load")st.style.color="";
  const icons={ok:'<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#3FB27A" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12.5l5 5L20 6"/></svg>',
    warn:'<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#E0A94B" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v5"/><circle cx="12" cy="16.5" r=".6" fill="#E0A94B"/><path d="M10.3 3.3 2.5 17a2 2 0 0 0 1.7 3h15.6a2 2 0 0 0 1.7-3L13.7 3.3a2 2 0 0 0-3.4 0Z"/></svg>',
    bad:'<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#F0888C" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>'};
  ring.innerHTML=icons[kind]||"";
  st.textContent=title;$("sub").textContent=sub;
}
function showRows(d){
  const rows=$("rows");
  rows.innerHTML=
    row("Policy number",d.policy_number)+
    row("Policyholder",d.full_name)+
    row("Vehicle",d.vehicle_reg)+
    row("Product",d.product)+
    row("Cover period",fmt(d.starts_on)+" – "+fmt(d.ends_on));
  rows.style.display="block";
}
function row(k,v){return '<div class="row"><span class="k">'+k+'</span><span class="v">'+(v||"—")+'</span></div>'}

async function run(){
  $("retry").style.display="none";$("rows").style.display="none";$("stamp").style.display="none";
  setState("load","Verifying…","Checking this certificate against the live register.");
  const p=qp("p");
  if(!p){setState("bad","No reference","This link has no policy reference to check.");return;}
  try{
    const r=await fetch(BASE+"/verify?p="+encodeURIComponent(p),{method:"GET",headers:{}});
    const d=await r.json();
    if(d.error) throw new Error(d.error);
    if(!d.found){
      setState("bad","No matching certificate","No policy with this reference exists in the register.");
      return;
    }
    if(d.valid){
      setState("ok","Valid policy","This certificate matches an active policy in the live register.");
    }else{
      setState("warn","Policy found — not active","This policy exists but is expired or cancelled.");
    }
    showRows(d);
    const stamp=$("stamp");
    stamp.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9FB2C6" stroke-width="1.8"><path d="M12 2 4 6v6c0 4.5 3 7.5 8 10 5-2.5 8-5.5 8-10V6z"/></svg> Verified against Platinum register · '+new Date().toLocaleString("en-GB");
    stamp.style.display="flex";
  }catch(e){
    console.error("[verify]",e);
    setState("bad","Couldn’t verify","The register couldn’t be reached. Please try again.");
    $("retry").style.display="flex";
  }
}
run();
</script>
</body>
</html>
